services:
  # Web Server (Nginx)
  web:
    container_name: gymadm-nginx
    image: nginx:alpine
    ports:
      - "${FORWARD_NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gymadm-network

  # Laravel Application
  app:
    container_name: gymadm-app
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: laravel_user
        uid: ${UID:-1000}
    volumes:
      - .:/var/www/html
      - ./docker/php/msmtprc:/etc/msmtprc:ro
    ports:
      - "${VITE_PORT:-5173}:5173"
    networks:
      - gymadm-network

  # Mailpit for sending test emails
  mailpit:
    container_name: gymadm-mailpit
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - gymadm-network

  # Database
  db:
    container_name: gymadm-mysql
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - gymadm_db_data:/var/lib/mysql
    networks:
      - gymadm-network

networks:
  gymadm-network:
    driver: bridge

volumes:
  gymadm_db_data: